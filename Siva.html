<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Inkence — The clue to your money</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            color: #1a2c3e;
            min-height: 100vh;
        }

        /* App Container */
        .app {
            max-width: 450px;
            margin: 0 auto;
            background: #f8fafc;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.05);
        }

        /* Modern Header with Wave */
        .header {
            background: linear-gradient(145deg, #0f2b1f 0%, #1e4a2f 100%);
            padding: 32px 24px 48px;
            border-radius: 0 0 32px 32px;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: #f8fafc;
            border-radius: 40px 40px 0 0;
        }

        .header-content {
            position: relative;
            z-index: 2;
        }

        .logo-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 11px;
            opacity: 0.7;
            color: white;
        }

        .user-menu {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-menu:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #FFB800, #F59E0B);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1a2c3e;
        }

        .greeting {
            margin-top: 16px;
        }

        .greeting h2 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .greeting p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        /* Main Content */
        .main-content {
            padding: 24px 20px 80px;
            position: relative;
            z-index: 5;
        }

        /* Glass Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(0px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        }

        /* Budget Card Special */
        .budget-card {
            background: linear-gradient(135deg, #1e3c2c 0%, #2a5a3a 100%);
            color: white;
        }

        .budget-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .progress-section {
            margin-top: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(90deg, #FFB800, #F59E0B);
            height: 100%;
            border-radius: 20px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* Quick Action Buttons */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 8px;
        }

        .action-btn {
            background: #f1f5f9;
            border: none;
            padding: 12px 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .action-btn:active {
            transform: scale(0.95);
            background: #e2e8f0;
        }

        .action-btn span:first-child {
            font-size: 24px;
        }

        .action-btn span:last-child {
            font-size: 12px;
            font-weight: 500;
            color: #475569;
        }

        /* Expense Items */
        .expense-list {
            margin-top: 8px;
        }

        .expense-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #eef2f6;
            cursor: pointer;
            transition: all 0.2s;
        }

        .expense-row:active {
            background: #f8fafc;
            transform: translateX(4px);
        }

        .expense-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .expense-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .expense-details h4 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .expense-details p {
            font-size: 11px;
            color: #94a3b8;
        }

        .expense-amount {
            font-weight: 700;
            font-size: 16px;
            color: #1e293b;
        }

        /* Category Chips */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .category-chip {
            background: #f1f5f9;
            padding: 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .category-chip.selected {
            background: #1e3c2c;
            color: white;
            border-color: #FFB800;
        }

        .category-chip.selected .category-icon {
            background: rgba(255, 255, 255, 0.2);
        }

        .category-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .category-name {
            font-weight: 600;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #475569;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.2s;
            background: white;
        }

        .input-field:focus {
            outline: none;
            border-color: #1e3c2c;
            box-shadow: 0 0 0 3px rgba(30, 60, 44, 0.1);
        }

        /* Buttons */
        .btn {
            padding: 14px 24px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1e3c2c, #2a5a3a);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: #1e293b;
        }

        /* Grocery Items */
        .grocery-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #eef2f6;
        }

        .grocery-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: #1e3c2c;
            cursor: pointer;
        }

        .grocery-name {
            flex: 1;
            font-weight: 500;
        }

        .grocery-name.bought {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .grocery-quantity {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #475569;
        }

        /* Loyalty Cards - Merged from your component */
        .loyalty-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .loyalty-card-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            padding: 18px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            min-height: 130px;
        }

        .loyalty-card-item:active {
            transform: scale(0.97);
        }

        .loyalty-card-item::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .loyalty-card-item::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .loyalty-card-content {
            position: relative;
            z-index: 2;
        }

        .loyalty-card-type {
            font-size: 10px;
            opacity: 0.7;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loyalty-card-store {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .loyalty-card-number {
            font-family: monospace;
            font-size: 13px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .loyalty-delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 20px;
            padding: 4px 8px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            z-index: 3;
        }

        /* Gradient backgrounds for loyalty cards */
        .gradient-grocery { background: linear-gradient(135deg, #10b981, #059669); }
        .gradient-retail { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .gradient-fuel { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .gradient-coffee { background: linear-gradient(135deg, #ec489a, #db2777); }
        .gradient-default { background: linear-gradient(135deg, #6366f1, #4f46e5); }

        /* Stokvel Cards - Merged from your component */
        .stokvel-card-item {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            border-radius: 24px;
            padding: 18px;
            color: white;
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
        }

        .stokvel-card-item::before {
            content: '';
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .stokvel-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .stokvel-detail {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 13px;
            opacity: 0.9;
        }

        .stokvel-members {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            margin-bottom: 12px;
        }

        .stokvel-member-badge {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 11px;
        }

        /* Modal Styles - Merged from your component */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-container {
            background: white;
            border-radius: 28px;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #94a3b8;
        }

        .member-list {
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .member-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .member-number {
            width: 28px;
            height: 28px;
            background: #1e3c2c;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 12px 20px 28px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 30px;
            transition: all 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .nav-item.active {
            color: #1e3c2c;
            background: rgba(30, 60, 44, 0.1);
        }

        .nav-item i {
            font-size: 22px;
        }

        /* Utilities */
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .mt-2 { margin-top: 8px; }
        .mt-3 { margin-top: 16px; }
        .mb-2 { margin-bottom: 8px; }
        .text-center { text-align: center; }
        .gap-2 { gap: 8px; }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            animation: fadeInUp 0.4s ease-out;
        }
    </style>
</head>
<body>
<div class="app" id="appRoot"></div>

<script>
    // ============ APP DATA ============
    let currentUser = { name: "Thabo", email: "thabo@example.com" };
    let appData = {
        expenses: [
            { id: '1', amount: 85, category: 'food', store: "Nando's", date: '2026-03-24' },
            { id: '2', amount: 120, category: 'transport', store: 'Uber', date: '2026-03-24' },
            { id: '3', amount: 29, category: 'airtime', store: 'Vodacom', date: '2026-03-23' },
            { id: '4', amount: 350, category: 'other', store: 'Checkers', date: '2026-03-22' }
        ],
        groceryLists: [
            { id: 'gl1', name: 'March 2026', isPinned: true, items: [
                { id: 'i1', name: 'Milk', quantity: '2L', bought: false },
                { id: 'i2', name: 'Bread', quantity: '', bought: true },
                { id: 'i3', name: 'Eggs', quantity: '1 doz', bought: false }
            ]},
            { id: 'gl2', name: 'Weekly Shop', isPinned: true, items: [
                { id: 'i4', name: 'Vegetables', quantity: '', bought: false }
            ]},
            { id: 'gl3', name: 'Braai with Friends', isPinned: false, items: [
                { id: 'i5', name: 'Boerewors', quantity: '2kg', bought: false }
            ]}
        ],
        budget: { amount: 5000, spent: 584 },
        loyaltyCards: [
            { id: 'lc1', store_name: 'Checkers', card_number: '**** 3456', card_type: 'Grocery' },
            { id: 'lc2', store_name: 'Clicks', card_number: '**** 7654', card_type: 'Retail' },
            { id: 'lc3', store_name: 'Engen', card_number: '**** 8901', card_type: 'Fuel' }
        ],
        stokvels: [
            { 
                id: 'st1', 
                name: 'Family Savings', 
                contribution_amount: 200, 
                frequency: 'monthly',
                members: [
                    { id: 'm1', name: 'Thabo' },
                    { id: 'm2', name: 'Lerato' },
                    { id: 'm3', name: 'Sipho' },
                    { id: 'm4', name: 'Zinhle' }
                ],
                yourBalance: 1200,
                current_round: 2,
                start_date: '2026-01-01'
            },
            { 
                id: 'st2', 
                name: 'Church Group', 
                contribution_amount: 500, 
                frequency: 'monthly',
                members: [
                    { id: 'm5', name: 'Pastor John' },
                    { id: 'm6', name: 'Mary' },
                    { id: 'm7', name: 'David' }
                ],
                yourBalance: 2500,
                current_round: 1,
                start_date: '2026-01-15'
            }
        ]
    };
    
    let currentView = 'dashboard';
    let selectedGroceryId = null;
    let selectedCategory = 'food';
    let showStokvelModal = false;
    let showLoyaltyModal = false;
    
    // Modal state for new stokvel
    let newStokvel = {
        name: '',
        contribution_amount: '',
        frequency: 'monthly',
        start_date: '',
        members: []
    };
    let memberInput = '';
    
    // Modal state for new loyalty card
    let newLoyalty = {
        store_name: '',
        card_number: '',
        card_type: 'Grocery'
    };
    
    // Helper Functions
    function getTodaySpend() {
        const today = new Date().toISOString().slice(0, 10);
        return appData.expenses.filter(e => e.date === today).reduce((s, e) => s + e.amount, 0);
    }
    
    function getCategoryIcon(cat) {
        const icons = { food: '🍔', transport: '🚕', airtime: '📱', other: '🛍️' };
        return icons[cat] || '💰';
    }
    
    function getCategoryColor(cat) {
        const colors = { food: '#f59e0b', transport: '#3b82f6', airtime: '#8b5cf6', other: '#ec489a' };
        return colors[cat] || '#64748b';
    }
    
    function getLoyaltyGradient(type) {
        const gradients = {
            Grocery: 'gradient-grocery',
            Retail: 'gradient-retail',
            Fuel: 'gradient-fuel',
            Coffee: 'gradient-coffee'
        };
        return gradients[type] || 'gradient-default';
    }
    
    function getLoyaltyEmoji(type) {
        const emojis = {
            Grocery: '🛒',
            Retail: '🏬',
            Fuel: '⛽',
            Coffee: '☕'
        };
        return emojis[type] || '💳';
    }
    
    function recalcSpent() {
        const currentMonth = new Date().toISOString().slice(0, 7);
        const monthly = appData.expenses.filter(e => e.date.startsWith(currentMonth));
        appData.budget.spent = monthly.reduce((sum, e) => sum + e.amount, 0);
    }
    
    function addMemberToNewStokvel() {
        if (!memberInput.trim()) return;
        newStokvel.members.push({ id: Date.now().toString(), name: memberInput.trim() });
        memberInput = '';
        renderModals();
    }
    
    function removeMemberFromNewStokvel(id) {
        newStokvel.members = newStokvel.members.filter(m => m.id !== id);
        renderModals();
    }
    
    function createStokvel() {
        if (!newStokvel.name.trim() || !newStokvel.contribution_amount || newStokvel.members.length < 2 || !newStokvel.start_date) {
            alert('Please fill all fields and add at least 2 members');
            return;
        }
        
        appData.stokvels.push({
            id: Date.now().toString(),
            name: newStokvel.name.trim(),
            contribution_amount: Number(newStokvel.contribution_amount),
            frequency: newStokvel.frequency,
            start_date: newStokvel.start_date,
            members: newStokvel.members,
            yourBalance: 0,
            current_round: 0
        });
        
        // Reset form
        newStokvel = { name: '', contribution_amount: '', frequency: 'monthly', start_date: '', members: [] };
        memberInput = '';

    function logStokvelContribution(id) {
        const stokvel = appData.stokvels.find(s => s.id === id);
        if (stokvel) {
            stokvel.yourBalance = (stokvel.yourBalance || 0) + stokvel.contribution_amount;
            appData.expenses.push({
                id: Date.now().toString(),
                amount: stokvel.contribution_amount,
                category: 'other',
                store: stokvel.name,
                date: new Date().toISOString().slice(0, 10)
            });
            recalcSpent();
            alert(`Added R${stokvel.contribution_amount} to ${stokvel.name}. New balance: R${stokvel.yourBalance}`);
            render();
        }
    }

    };
    
    window.showStokvelModalFunc = () => {
        showStokvelModal = true;
        render();
    };
    
    window.showLoyaltyModalFunc = () => {
        showLoyaltyModal = true;
        render();
    };
    
    window.closeGroceryDetail = () => {
        selectedGroceryId = null;
        render();
    };
    
    window.openGroceryDetail = (id) => {
        selectedGroceryId = id;
        render();
    };
    
    window.selectCategory = (cat) => {
        selectedCategory = cat;
        render();
    };
    
    window.setAmount = (amt) => {
        const input = document.getElementById('expAmount');
        if (input) input.value = amt;
    };
    
    window.quickAdd = (cat, amt) => {
        const newExp = {
            id: Date.now().toString(),
            amount: amt,
            category: cat,
            store: 'Quick',
            date: new Date().toISOString().slice(0, 10)
        };
        appData.expenses.push(newExp);
        recalcSpent();
        render();
    };
    
    window.saveExpense = () => {
        const amount = parseFloat(document.getElementById('expAmount')?.value);
        if (!amount || amount <= 0) {
            alert('Please enter a valid amount');
            return;
        }
        const newExp = {
            id: Date.now().toString(),
            amount: amount,
            category: selectedCategory,
            store: document.getElementById('expStore')?.value || '',
            date: document.getElementById('expDate')?.value || new Date().toISOString().slice(0, 10)
        };
        appData.expenses.push(newExp);
        recalcSpent();
        switchView('dashboard');
    };
    
    window.editExpense = (id) => {
        const exp = appData.expenses.find(e => e.id === id);
        if (exp) {
            const newAmt = prompt('Edit amount (R):', exp.amount);
            if (newAmt && !isNaN(parseFloat(newAmt))) {
                exp.amount = parseFloat(newAmt);
                recalcSpent();
                render();
            }
        }
    };
    
    window.updateBudget = () => {
        const newBudget = parseFloat(document.getElementById('budgetInput')?.value);
        if (newBudget && newBudget > 0) {
            appData.budget.amount = newBudget;
            render();
        }
    };
    
    window.createNewList = () => {
        const name = prompt('List name:');
        if (name) {
            appData.groceryLists.push({
                id: Date.now().toString(),
                name: name,
                isPinned: false,
                items: []
            });
            render();
        }
    };
    
    window.toggleItem = (listId, itemId) => {
        const list = appData.groceryLists.find(l => l.id === listId);
        const item = list?.items.find(i => i.id === itemId);
        if (item) {
            item.bought = !item.bought;
            render();
        }
    };
    
    window.deleteItem = (listId, itemId) => {
        const list = appData.groceryLists.find(l => l.id === listId);
        if (list) {
            list.items = list.items.filter(i => i.id !== itemId);
            render();
        }
    };
    
    window.addItem = (listId) => {
        const name = document.getElementById('newItemName')?.value;
        const qty = document.getElementById('newItemQty')?.value;
        if (!name) return;
        const list = appData.groceryLists.find(l => l.id === listId);
        if (list) {
            list.items.push({
                id: Date.now().toString(),
                name: name,
                quantity: qty,
                bought: false
            });
            render();
        }
    };
    
    window.copyList = (listId) => {
        const original = appData.groceryLists.find(l => l.id === listId);
        const newName = prompt('New list name:', original.name + ' (Copy)');
        if (newName) {
            appData.groceryLists.push({
                id: Date.now().toString(),
                name: newName,
                isPinned: false,
                items: original.items.map(i => ({ ...i, id: Date.now() + Math.random(), bought: false }))
            });
            render();
        }
    };
    
    window.logStokvelContribution = logStokvelContribution;
    window.deleteLoyaltyCard = deleteLoyaltyCard;
    window.addMemberToNewStokvel = addMemberToNewStokvel;
    window.removeMemberFromNewStokvel = removeMemberFromNewStokvel;
    window.createStokvel = createStokvel;
    window.createLoyaltyCard = createLoyaltyCard;
    
    window.exportData = () => {
        let csv = "Category,Amount,Store,Date\n";
        appData.expenses.forEach(e => {
            csv += `${e.category},${e.amount},${e.store || ''},${e.date}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'inkence_export.csv';
        a.click();
        URL.revokeObjectURL(url);
    };
    
    window.resetData = () => {
        if (confirm('Delete all data? This cannot be undone.')) {
            appData = {
                expenses: [],
                groceryLists: [],
                budget: { amount: 5000, spent: 0 },
                loyaltyCards: [],
                stokvels: []
            };
            recalcSpent();
            render();
        }
    };
    
    window.handleLogout = () => {
        if (confirm('Logout?')) {
            alert('Logged out (demo mode)');
        }
    };
    
    // Update modal input handlers
    function updateModalValues() {
        if (showStokvelModal) {
            const nameInput = document.getElementById('stokvelName');
            const contribInput = document.getElementById('stokvelContribution');
            const freqSelect = document.getElementById('stokvelFrequency');
            const dateInput = document.getElementById('stokvelStartDate');
            const memberInputField = document.getElementById('memberInput');
            
            if (nameInput) newStokvel.name = nameInput.value;
            if (contribInput) newStokvel.contribution_amount = contribInput.value;
            if (freqSelect) newStokvel.frequency = freqSelect.value;
            if (dateInput) newStokvel.start_date = dateInput.value;
            if (memberInputField) memberInput = memberInputField.value;
        }
        
        if (showLoyaltyModal) {
            const storeInput = document.getElementById('loyaltyStore');
            const numberInput = document.getElementById('loyaltyNumber');
            const typeSelect = document.getElementById('loyaltyType');
            
            if (storeInput) newLoyalty.store_name = storeInput.value;
            if (numberInput) newLoyalty.card_number = numberInput.value;
            if (typeSelect) newLoyalty.card_type = typeSelect.value;
        }
    }
    
    function render() {
        const container = document.getElementById('appRoot');
        let mainHtml = '';
        
        if (selectedGroceryId) {
            mainHtml = renderGroceryDetail(selectedGroceryId);
        } else {
            const views = {
                dashboard: renderDashboard,
                expense: renderExpenseForm,
                grocery: renderGroceryLists,
                budget: renderBudgetScreen,
                more: renderMoreScreen
            };
            mainHtml = (views[currentView] || renderDashboard)();
        }
        
        container.innerHTML = mainHtml + renderModals();
        
        // Attach input listeners for modals
        if (showStokvelModal) {
            const inputs = ['stokvelName', 'stokvelContribution', 'stokvelFrequency', 'stokvelStartDate', 'memberInput'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updateModalValues);
            });
        }
        
        if (showLoyaltyModal) {
            const inputs = ['loyaltyStore', 'loyaltyNumber', 'loyaltyType'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.addEventListener('input', updateModalValues);
            });
        }
    }
    
    // Initialize
    recalcSpent();
    render();
</script>
</body>
</html>
